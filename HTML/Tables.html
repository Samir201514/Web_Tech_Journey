<!DOCTYPE html>

                <td> 23-3 </td> 
                <td> 3.62 </td> 
            </tr>
            <tr>
                <td> Samir </td>

                <td> 2.3 </td>
            </tr>

            <tr>
                <td> Rahman </td>

                <td> 3.3 </td>
            </tr>
        </tbody>
    </table>

</body>

</html>

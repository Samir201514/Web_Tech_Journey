<!DOCTYPE html>
<html>

<head>
    <title> HTML Tags </title>
</head>

<body>
    <!-- Shortcut Key For Comment : "Ctrl + /" -->
    <!-- <Starting/OpeningTag Attributies>  Content </Ending/Closing Tag> -->
    <!-- Whole Thing Called Element -->

    <h1> Heading 1 </h1>
    <h2> Heading 2 </h2>
    <h3> Heading 3 </h3>
    <h4> Heading 4 </h4>
    <h5> Heading 5 </h5>
    <h6> Heading 6 </h6>

    <p> This is a paragraph. </p>
    <p> HTML stands <br> For Hyper Text Markup Language. </p>
    <hr> <!-- Horizontal Line -->

    <!-- This is HTML Link -->
    <!-- target="_blank" : To Open in New Tab -->
    <!-- title="txt" : Show the txt when hover the mouse -->
    <a href="https://github.com/Samir201514" title="GitHub" target="_blank"> My Git Hub Account </a>

</body>

</html>

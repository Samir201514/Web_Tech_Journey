<!DOCTYPE html>
<html lang="en">

<head>
    <title> HTML Forms </title>
</head>

<body>
    <h1 style="text-align: center;"> Forms </h1>

    <form action="https://github.com/Samir201514" target="_blank">
        <fieldset>
            <legend style="text-align: center;"> Personal Information </legend>

            <label> Name : </label>
            <!-- readonly disabled -->
            <input placeholder="Enter your name" type="text">
            <br> <br>

            <label> ID : </label>
            <input placeholder="Enter your ID" type="text">
            <br> <br>

            <label> Age : </label>
            <input placeholder="Enter your age" type="number">
            <br> <br>

            <label> Date of Birth : </label>
            <input type="date">
            <br> <br>

            <label> Gender : </label>
            <!-- Used name attributies to group the radio
                 Used value attributies to store the value 
                 Used for attributies to clickable labels (id & for should be the same)-->
            <input id="male" type="radio" name="gender" value="Male">
            <label for="male"> Male </label>
            <input id="female" type="radio" name="gender" value="Female">
            <label for="female"> Female </label>
            <br> <br>

            <label> E-mail : </label>
            <input required placeholder="Enter your email address" type="email">
            <br> <br>

            <label> Password : </label>
            <input placeholder="Enter your password" type="password">
            <br> <br>

            <label> Country : </label>
            <select>
                <option value=""> Select a Country </option>
                <option value="bd"> Bangladesh </option>
                <option value="usa"> USA </option>
                <option value="uk"> UK </option>
            </select>
        </fieldset>

        <br> <br>

        <fieldset>
            <legend style="text-align: center;"> Academic Information </legend>

            <label> Courses : </label>
            <!-- Used name attributies to group the checkbox
            Used value attributies to store the value -->
            <input id="wt" type="checkbox" name="course" value="webTech">
            <label for="wt"> Web Tech </label>
            <input id="cg" type="checkbox" name="course" value="computerGraphics">
            <label for="cg"> Computer Graphics </label>
            <input id="rm" type="checkbox" name="course" value="rm">
            <label for="rm"> RM </label>
            <input id="che" type="checkbox" name="course" value="chemistry">
            <label for="che"> Chemistry </label>
            <br> <br>

            <label> Class Time : </label>
            <input type="time">
            <br> <br>

            <label> Grade Sheet : </label>
            <input type="file" accept="application/pdf">
        </fieldset>

        <br> <br>

        <fieldset>
            <legend style="text-align: center;"> Others </legend>

            <label> Colors : </label>
            <input type="color">
            <br> <br>

            <label> Range : </label>
            <input min="0" max="100" type="range">
            <br> <br>

            <textarea placeholder="Feedbacks" cols="50" rows="10"></textarea>
            <br> <br>

        </fieldset>

        <br> <br>

        <input type="submit">
        <input type="reset">
    </form>

</body>

</html>

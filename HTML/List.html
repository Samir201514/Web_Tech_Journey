<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML List</title>
</head>
<body>
    <h1 style="text-align: center;"> List </h1>

    <p> Unordered List </p>
    <ul style="list-style-type: square;">
        <li> Web Tech </li>
        <li> Computer Graphics </li>
        <li> Research Methodology </li>
        <li> Chemistry </li>
    </ul>
    
    <hr>
    
    <p> Ordered List </p>
    <ol type="I" start="100">
        <li> ML </li>
        <li> IDS </li>
        <li> DWDM </li>
        <li> NLP </li>
        <li> CVPR </li>
    </ol>

    <hr>

    <p> Discription List </p>
    <dl>
        <!-- dt : term/name 
             dd : discribes -->

        <dt> Front End </dt>
        <dd> => HTML, CSS, JS </dd>

        <dt> Back End </dt>
        <dd> => PHP </dd>
    </dl>
    
</body>
</html>
